version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aegisai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    environment:
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=llama3.2

volumes:
  ollama_data:
