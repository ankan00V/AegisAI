apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegisai-backend
  labels:
    app: aegisai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aegisai-backend
  template:
    metadata:
      labels:
        app: aegisai-backend
    spec:
      containers:
      - name: aegisai-backend
        image: aegisai-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: aegisai-config
        - secretRef:
            name: aegisai-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        volumeMounts:
        - name: faiss-storage
          mountPath: /app/faiss_index
      volumes:
      - name: faiss-storage
        persistentVolumeClaim:
          claimName: faiss-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aegisai-backend
  labels:
    app: aegisai-backend
spec:
  selector:
    app: aegisai-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: faiss-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegisai-config
data:
  APP_NAME: "AegisAI"
  DEBUG: "false"
  API_V1_PREFIX: "/api/v1"
  GUARD_SANITIZATION_LEVEL: "medium"
  GUARD_MAX_PROMPT_LENGTH: "2000"
  LLM_MODEL: "gpt-4o-mini"
  FAISS_INDEX_PATH: "/app/faiss_index"
  RAG_CHUNK_SIZE: "1000"
  RAG_CHUNK_OVERLAP: "200"
