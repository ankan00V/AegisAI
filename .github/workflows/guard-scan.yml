# Guard Scan — scan prompt files in the repo against the AegisAI Guard API on every PR.
# Copyright (C) 2024 Sarthak Doshi (github.com/SdSarthak)
# SPDX-License-Identifier: AGPL-3.0-only
#
# TODO (high priority — implement):
#   - This workflow is a scaffold. Implement the `scan` step to:
#       1. Find all files matching `.prompts/**/*.txt` in the repo.
#       2. POST each file's content to $AEGISAI_GUARD_URL/api/v1/guard/scan
#          with Authorization: Bearer $AEGISAI_API_TOKEN.
#       3. If any response has decision="block", fail the workflow and print
#          the matched_patterns in the PR comment.
#   - Add a step that posts a summary comment to the PR using
#     `gh pr comment` with the scan results table.
#   - Secrets needed: AEGISAI_GUARD_URL, AEGISAI_API_TOKEN (set in repo settings).
#   - Acceptance criteria: a PR that adds a .prompts/ file containing
#     "ignore all previous instructions" triggers a workflow failure
#     and a PR comment listing the blocked patterns.

name: Guard Scan

on:
  pull_request:
    paths:
      - ".prompts/**"

jobs:
  scan:
    name: Scan prompt files
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Scan prompt files
        run: python scripts/scan_prompts.py
        env:
          AEGISAI_GUARD_URL: ${{ secrets.AEGISAI_GUARD_URL }}
          AEGISAI_API_TOKEN: ${{ secrets.AEGISAI_API_TOKEN }}

      - name: Comment scan results on PR
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f guard-scan-report.json ]; then
            COMMENT_BODY=$(python - <<'PY'
import json

with open('guard-scan-report.json', 'r', encoding='utf-8') as report_file:
    report = json.load(report_file)

blocked = report.get('blocked', [])
if not blocked:
    print('Guard scan failed, but no blocked prompt details were captured.')
else:
    lines = ['Guard Scan blocked the following prompt files:']
    for item in blocked:
        lines.append(f"- `{item['file']}`: {item['patterns']}")
    print('\n'.join(lines))
PY
            )
            gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "Guard scan failed before a report could be written."
          fi
