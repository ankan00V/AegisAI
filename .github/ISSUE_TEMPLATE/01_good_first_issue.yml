name: "Good First Issue"
description: "Beginner-friendly task — no deep domain knowledge needed"
labels: ["good first issue", "beginner"]
body:
  - type: markdown
    attributes:
      value: |
        Welcome! This issue is designed to be beginner-friendly.
        Read [CONTRIBUTING.md](../../CONTRIBUTING.md) before starting.
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files to touch
      description: Which files are likely involved?
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] ...
        - [ ] Tests pass
    validations:
      required: true
