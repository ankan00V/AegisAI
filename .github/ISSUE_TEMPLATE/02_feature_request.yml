name: "Feature Request (Intermediate)"
description: "Propose a new feature or improvement"
labels: ["help wanted", "enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why is it important?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you want to build.
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Which module does this touch?
      options:
        - Compliance Engine
        - LLM Guard
        - RAG Intelligence
        - Frontend
        - Infra / DevOps
        - Multiple
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false
